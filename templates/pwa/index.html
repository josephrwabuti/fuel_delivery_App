<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FuelGo">
  <link rel="manifest" href="/static/pwa/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/pwa/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/static/pwa/icons/icon-192.svg">
  <title>FuelGo</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'pwa/css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    .leaflet-container { background: #1e293b !important; }
    .leaflet-popup-content-wrapper { background: #1e293b !important; color: #f1f5f9 !important; border: 1px solid #334155 !important; border-radius: 12px !important; }
    .leaflet-popup-tip { background: #1e293b !important; }
    .leaflet-control-zoom a { background: #334155 !important; color: #f1f5f9 !important; border-color: #475569 !important; }
    .leaflet-control-attribution { background: rgba(15,23,42,.8) !important; color: #64748b !important; }
    .leaflet-control-attribution a { color: #f97316 !important; }
    .pwa-marker-user { width:18px;height:18px;background:#3b82f6;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(59,130,246,.3); }
    .pwa-marker-station { width:14px;height:14px;background:#f97316;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(249,115,22,.5); }
    .pwa-marker-station.closed { background:#64748b; }
    .pwa-marker-delivery { width:22px;height:22px;background:#f97316;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(249,115,22,.3);cursor:grab; }
    .pwa-marker-route-start { width:14px;height:14px;background:#22c55e;border:2px solid #fff;border-radius:50%; }
    .pwa-marker-route-end { width:16px;height:16px;background:#ef4444;border:2px solid #fff;border-radius:50%; }
  </style>
</head>
<body>
  <div id="root"></div>
  {% csrf_token %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="{% static 'pwa/js/api.js' %}"></script>
  <script src="{% static 'pwa/js/app.js' %}"></script>
</body>
</html>
